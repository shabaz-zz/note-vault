# ============================================================
#  application.properties
#  This tells Spring Boot how to connect to MariaDB.
#  These values are read from environment variables set
#  in your docker-compose.yml — so you never hardcode
#  passwords in your code.
# ============================================================

# Database connection — MariaDB
# ${DB_HOST} means "read the DB_HOST variable from docker-compose"
# MariaDB default port is 3306 (different from Postgres which is 5432)
spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:3306/${DB_NAME:notesdb}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:secret}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / Hibernate settings
# update = creates tables automatically if they don't exist
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Server port — must match what docker-compose exposes
server.port=5000

# App name shown in logs
spring.application.name=VaultCourier
