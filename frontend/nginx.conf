# ============================================================
#  nginx.conf — Frontend Routing Config
#
#  Two jobs:
#    1. Serve index.html for any page request
#    2. Forward /api/... requests to the Java backend
#       container instead of trying to serve them as files
# ============================================================

events {
    # How many connections Nginx handles at once
    # 1024 is fine for a local project
    worker_connections 1024;
}

http {
    # Tells Nginx what file types to serve correctly
    # (html, css, js, images etc.)
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        # Listen on port 80 — standard web port
        listen 80;

        # ── SERVE FRONTEND ──────────────────────────────
        # Any request that isn't /api goes here
        # Loads index.html from the folder we copied into
        location / {
            root /usr/share/nginx/html;
            index index.html;

            # try_files: look for the file first,
            # if not found fall back to index.html
            # (important for single page apps)
            try_files $uri $uri/ /index.html;
        }

        # ── PROXY API CALLS TO BACKEND ──────────────────
        # Any request starting with /api gets forwarded
        # to the backend container on port 5000.
        #
        # "backend" here is the SERVICE NAME from
        # docker-compose.yml — Docker resolves it
        # automatically to the right container IP.
        location /api/ {
            proxy_pass http://backend:5000;

            # Pass along the original request info
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Tells backend the original port the
            # browser used (80), not the internal one
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
