<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NOTES-VAULT // MISSION CONTROL</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--g:#00ff9f;--a:#ffaa00;--r:#ff4444;--p:#aa66ff;--bg:#050a0f;--panel:rgba(5,10,15,0.95);}
html,body{height:100%;background:#000;font-family:'Share Tech Mono',monospace;color:var(--g);overflow:hidden;}

/* STARS */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;background:#fff;border-radius:50%;}
.scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:200;}

@keyframes twinkle{from{opacity:.06}to{opacity:.8}}
@keyframes blink{50%{opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes scan{from{left:-100%}to{left:200%}}
@keyframes flicker{0%,100%{opacity:1}94%{opacity:.85}96%{opacity:.5}98%{opacity:.9}}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* LAYOUT */
.app{position:relative;z-index:5;height:100vh;display:grid;grid-template-rows:auto 1fr;max-width:1400px;margin:0 auto;}

/* TOPBAR */
.topbar{background:#030810;border-bottom:1px solid #00ff9f28;padding:10px 20px;display:flex;align-items:center;gap:16px;}
.sig{width:8px;height:8px;border-radius:50%;background:var(--g);animation:pulse 2s infinite;flex-shrink:0;}
.logo{font-family:'Orbitron',monospace;font-size:.88rem;color:var(--g);letter-spacing:.15em;}
.title{flex:1;text-align:center;font-family:'Orbitron',monospace;font-size:1.1rem;color:var(--g);letter-spacing:.15em;text-shadow:0 0 12px var(--g);}
.clock-group{display:flex;flex-direction:column;align-items:flex-end;}
.clock{font-family:'Orbitron',monospace;font-size:1rem;color:var(--g);letter-spacing:.1em;animation:flicker 9s infinite;}
.sdate{font-size:.65rem;color:#00ff9f55;letter-spacing:.08em;}
.status-pill{display:flex;align-items:center;gap:6px;font-size:.65rem;color:#00ff9f70;letter-spacing:.1em;background:#00ff9f0a;border:1px solid #00ff9f25;padding:3px 10px;border-radius:20px;}
.status-pill.offline{color:#ff444470;border-color:#ff444425;background:#ff44440a;}

/* MAIN */
.main{display:grid;grid-template-columns:300px 1fr;height:100%;overflow:hidden;}

/* SIDEBAR */
.sidebar{background:#030810;border-right:1px solid #00ff9f18;display:flex;flex-direction:column;overflow:hidden;}

.sidebar-head{padding:12px 14px;border-bottom:1px solid #00ff9f18;}
.sidebar-title{font-family:'Orbitron',monospace;font-size:.68rem;color:#00ff9faa;letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px;}
.search-wrap{position:relative;}
.search-input{width:100%;background:#020810;border:1px solid #00ff9f55;color:var(--g);font-family:'Share Tech Mono',monospace;font-size:.8rem;padding:6px 10px 6px 30px;border-radius:4px;outline:none;transition:border-color .15s;}
.search-input::placeholder{color:#00ff9f55;}
.search-input:focus{border-color:#00ff9f60;}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:.8rem;color:#00ff9f40;}

.notes-list{flex:1;overflow-y:auto;padding:6px;}
.notes-list::-webkit-scrollbar{width:2px;}
.notes-list::-webkit-scrollbar-thumb{background:#00ff9f28;}

.note-item{padding:10px 12px;border-radius:5px;border:1px solid transparent;cursor:pointer;margin-bottom:4px;transition:all .15s;position:relative;overflow:hidden;}
.note-item::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:1px;background:linear-gradient(90deg,transparent,#00ff9f60,transparent);}
.note-item:hover::before{animation:scan 1.5s linear;}
.note-item:hover{border-color:#00ff9f28;background:#00ff9f08;}
.note-item.active{border-color:#00ff9f45;background:#00ff9f0f;}
.note-item-title{font-size:.82rem;color:#00ff9fcc;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-item-meta{font-size:.68rem;color:#00ff9f40;display:flex;justify-content:space-between;}
.note-item-preview{font-size:.72rem;color:#00ff9f55;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-item-del{position:absolute;right:8px;top:8px;background:transparent;border:none;color:#ff444460;cursor:pointer;font-size:.8rem;opacity:0;transition:opacity .15s;}
.note-item:hover .note-item-del{opacity:1;}
.note-item-del:hover{color:var(--r);}

.sidebar-foot{padding:10px 14px;border-top:1px solid #00ff9f18;}
.new-btn{width:100%;padding:8px;background:transparent;border:1px solid #00ff9f45;color:var(--g);font-family:'Orbitron',monospace;font-size:.7rem;letter-spacing:.12em;border-radius:4px;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.new-btn:hover{background:#00ff9f12;border-color:var(--g);box-shadow:0 0 10px #00ff9f18;}

.empty-state{padding:30px 14px;text-align:center;color:#00ff9f70;font-size:.78rem;line-height:2;}

/* EDITOR */
.editor{display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}

.editor-toolbar{background:#030810;border-bottom:1px solid #00ff9f18;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.note-title-input{flex:1;background:transparent;border:none;color:var(--g);font-family:'Orbitron',monospace;font-size:1rem;letter-spacing:.1em;outline:none;min-width:0;}
.note-title-input::placeholder{color:#00ff9f1a;}
.toolbar-meta{font-size:.68rem;color:#00ff9f40;white-space:nowrap;}

.btn{font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:.1em;padding:5px 12px;border-radius:4px;cursor:pointer;border:1px solid;background:transparent;transition:all .15s;white-space:nowrap;text-transform:uppercase;}
.btn-g{color:var(--g);border-color:#00ff9f40;}
.btn-g:hover{background:#00ff9f12;border-color:var(--g);}
.btn-r{color:var(--r);border-color:#ff444440;}
.btn-r:hover{background:#ff444412;border-color:var(--r);}
.btn-a{color:var(--a);border-color:#ffaa0040;}
.btn-a:hover{background:#ffaa0012;border-color:var(--a);}

.tag-row{padding:6px 16px;border-bottom:1px solid #00ff9f10;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.tag{font-size:.65rem;padding:2px 8px;border-radius:20px;border:1px solid #00ff9f30;color:#00ff9f80;background:#00ff9f08;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;}
.tag:hover{border-color:#00ff9f60;color:var(--g);}
.tag .tag-del{color:#ff444460;font-size:.7rem;}
.tag-del:hover{color:var(--r);}
.tag-input{background:transparent;border:none;border-bottom:1px solid #00ff9f28;color:var(--g);font-family:'Share Tech Mono',monospace;font-size:.72rem;padding:2px 4px;outline:none;width:80px;}
.tag-input::placeholder{color:#00ff9f18;}

.editor-body{flex:1;padding:16px;overflow:hidden;display:flex;flex-direction:column;gap:0;}
.note-textarea{flex:1;background:transparent;border:none;color:var(--g);font-family:'Share Tech Mono',monospace;font-size:.9rem;line-height:1.9;outline:none;resize:none;caret-color:var(--g);}
.note-textarea::placeholder{color:#00ff9f15;}

/* STATUS BAR */
.statusbar{background:#030810;border-top:1px solid #00ff9f18;padding:5px 16px;display:flex;align-items:center;gap:16px;font-size:.67rem;color:#00ff9f40;}
.sb-item{display:flex;align-items:center;gap:5px;}
.sb-dot{width:5px;height:5px;border-radius:50%;background:var(--g);box-shadow:0 0 4px var(--g);}
.sb-saved{color:#00ff9f40;}
.sb-saved.show{color:var(--g);animation:fadein .2s ease;}

/* WELCOME SCREEN */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;}
.welcome-logo{font-family:'Orbitron',monospace;font-size:1.8rem;color:var(--g);letter-spacing:.2em;text-shadow:0 0 20px var(--g);text-align:center;}
.welcome-sub{font-size:.8rem;color:#00ff9f50;letter-spacing:.1em;text-align:center;line-height:2;}
.welcome-btn{padding:10px 24px;border:1px solid #00ff9f45;background:transparent;color:var(--g);font-family:'Orbitron',monospace;font-size:.78rem;letter-spacing:.14em;border-radius:4px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
.welcome-btn:hover{background:#00ff9f12;border-color:var(--g);box-shadow:0 0 16px #00ff9f18;}

/* RADAR CORNER */
.radar-corner{position:fixed;bottom:16px;right:16px;opacity:.18;pointer-events:none;z-index:1;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#030810;border:1px solid var(--g);color:var(--g);font-family:'Orbitron',monospace;font-size:.72rem;letter-spacing:.1em;padding:8px 18px;border-radius:4px;z-index:9999;opacity:0;transition:opacity .3s;box-shadow:0 0 20px #00ff9f18;text-transform:uppercase;}
.toast.show{opacity:1;}

/* SCROLLBAR GLOBAL */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#00ff9f28;}
</style>
</head>
<body>

<div class="scanlines"></div>
<div class="stars" id="stars"></div>

<!-- SMALL RADAR DECORATION -->
<canvas class="radar-corner" id="radarCorner" width="80" height="80"></canvas>

<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="sig"></span>
    <span class="logo">EXPLORER-01</span>
    <span class="title">// NOTES-VAULT</span>
    <div class="status-pill" id="apiStatus">
      <span>●</span><span id="apiStatusText">LOCAL MODE</span>
    </div>
    <div class="clock-group">
      <span class="clock" id="clockDisp">00:00:00</span>
      <span class="sdate" id="sdDisp">STARDATE ---</span>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-title">TRANSMISSIONS</div>
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input class="search-input" id="searchInput" type="text" placeholder="search notes..." oninput="filterNotes(this.value)">
        </div>
      </div>

      <div class="notes-list" id="notesList"></div>

      <div class="sidebar-foot">
        <button class="new-btn" onclick="newNote()">+ NEW TRANSMISSION</button>
      </div>
    </div>

    <!-- EDITOR -->
    <div class="editor" id="editorPanel">

      <!-- WELCOME STATE -->
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-logo">⬡ NOTES-VAULT</div>
        <div class="welcome-sub">
          All transmissions stored locally.<br>
          Select a note or create a new one to begin.<br>
          <span style="color:#00ff9f30;">When backend is connected, notes sync to database.</span>
        </div>
        <button class="welcome-btn" onclick="newNote()">+ NEW TRANSMISSION</button>
      </div>

      <!-- EDITOR STATE -->
      <div id="editorContent" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden;">

        <div class="editor-toolbar">
          <input class="note-title-input" id="noteTitleInput" type="text" placeholder="TRANSMISSION TITLE..." oninput="onTitleChange()">
          <span class="toolbar-meta" id="noteMeta">---</span>
          <button class="btn btn-g" onclick="saveNote()">▶ SAVE</button>
          <button class="btn btn-r" onclick="deleteCurrentNote()">✕ DELETE</button>
        </div>

        <div class="tag-row" id="tagRow">
          <span style="font-size:.65rem;color:#00ff9f35;letter-spacing:.1em;">TAGS:</span>
          <div id="tagList"></div>
          <input class="tag-input" id="tagInput" placeholder="+ tag" onkeydown="if(event.key==='Enter'||event.key===',')addTag()">
        </div>

        <div class="editor-body">
          <textarea class="note-textarea" id="noteTextarea" placeholder="// begin transmission...&#10;&#10;Write your notes here.&#10;Your data is stored locally and will sync to database when backend is connected.&#10;&#10;_" oninput="onContentChange()"></textarea>
        </div>

        <div class="statusbar">
          <span class="sb-item"><span class="sb-dot"></span>WORDS: <span id="wordCount">0</span></span>
          <span class="sb-item">CHARS: <span id="charCount">0</span></span>
          <span class="sb-item">LINES: <span id="lineCount">0</span></span>
          <span style="margin-left:auto;" class="sb-saved" id="savedLabel">READY</span>
        </div>

      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STARS ──
(function(){const e=document.getElementById('stars');for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*1.5+.3;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;opacity:${Math.random()*.5+.06};animation:twinkle ${2+Math.random()*3}s ${Math.random()*3}s infinite alternate;`;e.appendChild(s);}})();

// ── RADAR CORNER ──
(function(){const c=document.getElementById('radarCorner');const x=c.getContext('2d');const cx=40,cy=40,maxR=35;for(let r=1;r<=3;r++){x.beginPath();x.arc(cx,cy,maxR*r/3,0,Math.PI*2);x.strokeStyle=`rgba(0,255,159,${0.04+r*.03})`;x.lineWidth=.5;x.stroke();}for(let i=0;i<6;i++){const ang=(i/6)*Math.PI*2;x.beginPath();x.moveTo(cx,cy);x.lineTo(cx+maxR*Math.cos(ang),cy+maxR*Math.sin(ang));x.strokeStyle='rgba(0,255,159,0.05)';x.lineWidth=.4;x.stroke();}x.beginPath();x.arc(cx,cy,3,0,Math.PI*2);x.fillStyle='rgba(0,255,159,0.4)';x.fill();})();

// ── CLOCK ──
const MO=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
function pad(n){return String(n).padStart(2,'0');}
(function tick(){const n=new Date();document.getElementById('clockDisp').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;document.getElementById('sdDisp').textContent=`STARDATE ${n.getFullYear()}.${pad(n.getMonth()+1)}${pad(n.getDate())}`;setTimeout(tick,1000);})();

// ── STORAGE ──
function ld(k,d){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch{return d;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// ── TOAST ──
function toast(msg,col){const t=document.getElementById('toast');t.textContent=msg;t.style.borderColor=col||'var(--g)';t.style.color=col||'var(--g)';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// ── API ──
// When your backend is ready, change this to your backend URL like:
// const API = 'http://localhost:5000/api'
// All functions below already call it — just set the URL and it works.
const API = null; // null = use localStorage only

async function apiGet(path){if(!API)return null;try{const r=await fetch(API+path);if(!r.ok)return null;return await r.json();}catch{return null;}}
async function apiPost(path,data){if(!API)return null;try{const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});if(!r.ok)return null;return await r.json();}catch{return null;}}
async function apiPut(path,data){if(!API)return null;try{const r=await fetch(API+path,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});if(!r.ok)return null;return await r.json();}catch{return null;}}
async function apiDel(path){if(!API)return null;try{const r=await fetch(API+path,{method:'DELETE'});if(!r.ok)return null;return await r.json();}catch{return null;}}

function updateApiStatus(online){const el=document.getElementById('apiStatus');const txt=document.getElementById('apiStatusText');if(online){el.classList.remove('offline');txt.textContent='BACKEND ONLINE';}else{el.classList.add('offline');txt.textContent='LOCAL MODE';}}

async function checkBackend(){if(!API){updateApiStatus(false);return;}const r=await apiGet('/health');updateApiStatus(!!r);}
checkBackend();setInterval(checkBackend,10000);

// ── STATE ──
let notes=ld('notes',[]);
let currentId=null;
let saveTimeout=null;
let filterQuery='';

// ── NOTE OPS ──
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

function getNoteById(id){return notes.find(n=>n.id===id);}

function newNote(){
  const now=new Date();
  const note={
    id:genId(),
    title:'UNTITLED TRANSMISSION',
    content:'',
    tags:[],
    created:now.toISOString(),
    updated:now.toISOString()
  };
  notes.unshift(note);
  sv('notes',notes);
  renderList();
  openNote(note.id);
  setTimeout(()=>{const t=document.getElementById('noteTitleInput');t.select();},100);
}

async function saveNote(showToast=true){
  if(!currentId)return;
  const note=getNoteById(currentId);
  if(!note)return;
  note.title=document.getElementById('noteTitleInput').value.trim()||'UNTITLED TRANSMISSION';
  note.content=document.getElementById('noteTextarea').value;
  note.updated=new Date().toISOString();
  sv('notes',notes);

  // Try backend save
  if(API){
    const r=await apiPut(`/notes/${currentId}`,note);
    if(!r){
      // fallback already done via localStorage
    }
  }

  renderList();
  updateMeta(note);
  if(showToast)toast('TRANSMISSION SAVED');
  document.getElementById('savedLabel').textContent='SAVED ✓';
  setTimeout(()=>document.getElementById('savedLabel').textContent='READY',2000);
}

function openNote(id){
  currentId=id;
  const note=getNoteById(id);
  if(!note)return;

  document.getElementById('welcomeScreen').style.display='none';
  const ec=document.getElementById('editorContent');
  ec.style.display='flex';
  ec.style.flexDirection='column';
  ec.style.flex='1';
  ec.style.overflow='hidden';

  document.getElementById('noteTitleInput').value=note.title;
  document.getElementById('noteTextarea').value=note.content;
  updateMeta(note);
  renderTags(note.tags);
  updateCounts(note.content);
  renderList();
  document.getElementById('noteTextarea').focus();
}

function updateMeta(note){
  const d=new Date(note.updated);
  document.getElementById('noteMeta').textContent=`${d.getDate()} ${MO[d.getMonth()]} ${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

async function deleteCurrentNote(){
  if(!currentId)return;
  if(!confirm('DELETE THIS TRANSMISSION? Cannot be undone.'))return;
  if(API)await apiDel(`/notes/${currentId}`);
  notes=notes.filter(n=>n.id!==currentId);
  sv('notes',notes);
  currentId=null;
  document.getElementById('welcomeScreen').style.display='flex';
  document.getElementById('editorContent').style.display='none';
  renderList();
  toast('TRANSMISSION DELETED','var(--r)');
}

// ── RENDER LIST ──
function renderList(){
  const el=document.getElementById('notesList');
  const q=filterQuery.toLowerCase();
  const filtered=notes.filter(n=>!q||(n.title.toLowerCase().includes(q)||n.content.toLowerCase().includes(q)||(n.tags&&n.tags.some(t=>t.toLowerCase().includes(q)))));

  if(!filtered.length){
    el.innerHTML=`<div class="empty-state">${q?'// no results found<br>try a different query':'// no transmissions yet<br>create your first note'}</div>`;
    return;
  }

  el.innerHTML=filtered.map(note=>{
    const d=new Date(note.updated);
    const dateStr=`${d.getDate()} ${MO[d.getMonth()]} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    const preview=note.content.replace(/\n/g,' ').slice(0,50);
    const tags=note.tags&&note.tags.length?`<div style="margin-top:3px;display:flex;gap:3px;flex-wrap:wrap;">${note.tags.map(t=>`<span style="font-size:.62rem;color:#00ff9f50;border:1px solid #00ff9f20;padding:1px 5px;border-radius:10px;">${t}</span>`).join('')}</div>`:'';
    return`<div class="note-item${note.id===currentId?' active':''}" onclick="openNote('${note.id}')">
      <div class="note-item-title">${note.title}</div>
      <div class="note-item-meta"><span>${dateStr}</span></div>
      ${preview?`<div class="note-item-preview">${preview}...</div>`:''}
      ${tags}
      <button class="note-item-del" onclick="event.stopPropagation();quickDelete('${note.id}')">✕</button>
    </div>`;
  }).join('');
}

function quickDelete(id){
  if(!confirm('Delete this note?'))return;
  notes=notes.filter(n=>n.id!==id);
  sv('notes',notes);
  if(currentId===id){
    currentId=null;
    document.getElementById('welcomeScreen').style.display='flex';
    document.getElementById('editorContent').style.display='none';
  }
  renderList();
  toast('DELETED','var(--r)');
}

function filterNotes(q){filterQuery=q;renderList();}

// ── TAGS ──
function renderTags(tags){
  const el=document.getElementById('tagList');
  el.innerHTML=(tags||[]).map((t,i)=>`<span class="tag">${t}<span class="tag-del" onclick="removeTag(${i})">✕</span></span>`).join('');
}

function addTag(){
  if(!currentId)return;
  const input=document.getElementById('tagInput');
  const val=input.value.replace(',','').trim();
  if(!val)return;
  const note=getNoteById(currentId);
  if(!note.tags)note.tags=[];
  if(!note.tags.includes(val)){note.tags.push(val);sv('notes',notes);renderTags(note.tags);renderList();}
  input.value='';
}

function removeTag(i){
  if(!currentId)return;
  const note=getNoteById(currentId);
  note.tags.splice(i,1);
  sv('notes',notes);
  renderTags(note.tags);
  renderList();
}

// ── COUNTS ──
function updateCounts(text){
  const words=text.trim()?text.trim().split(/\s+/).length:0;
  const chars=text.length;
  const lines=text?text.split('\n').length:0;
  document.getElementById('wordCount').textContent=words;
  document.getElementById('charCount').textContent=chars;
  document.getElementById('lineCount').textContent=lines;
}

// ── AUTOSAVE ──
function onContentChange(){
  const content=document.getElementById('noteTextarea').value;
  updateCounts(content);
  document.getElementById('savedLabel').textContent='UNSAVED...';
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(()=>saveNote(false),2000);
}

function onTitleChange(){
  document.getElementById('savedLabel').textContent='UNSAVED...';
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(()=>saveNote(false),1500);
}

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveNote();}
  if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();newNote();}
});

// ── INIT ──
// Try to load from backend first, fall back to localStorage
async function loadNotes(){
  const backendNotes=await apiGet('/notes');
  if(backendNotes&&Array.isArray(backendNotes)){
    notes=backendNotes;
    sv('notes',notes);
    updateApiStatus(true);
  } else {
    notes=ld('notes',[]);
    updateApiStatus(false);
  }
  renderList();
}

loadNotes();
</script>
